<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow4Me Login</title>
</head>
<body>
<h2>Grow4Me</h2>
<p>Sign in to your account</p>
{% if error %}<p><b style="color:red">{{ error }}</b></p>{% endif %}
<form method="post" action="/lite/login/">
{% csrf_token %}
<p>Email:<br><input type="email" name="email" size="25" required></p>
<p>Password:<br><input type="password" name="password" size="25" required></p>
<p><input type="submit" value="Login"></p>
</form>
</body>
</html>
