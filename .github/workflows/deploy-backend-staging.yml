name: Deploy Backend (Staging)

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Build & Deploy Backend to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grow4me-backend/api:latest \
            ./backend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grow4me-backend/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy grow4me-backend \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grow4me-backend/api:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:us-central1:grow4me-db \
            --set-env-vars "CLOUD_SQL_CONNECTION_NAME=${{ secrets.GCP_PROJECT_ID }}:us-central1:grow4me-db,DB_NAME=grow4me_budget,DB_USER=postgres" \
            --set-secrets "SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Run Migrations
        run: |
          gcloud run jobs update run-migrations \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grow4me-backend/api:latest \
            --args="manage.py,migrate,--fake-initial" \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }}
          gcloud run jobs execute run-migrations \
            --region us-central1 \
            --wait \
            --project ${{ secrets.GCP_PROJECT_ID }}
